# events 블록: Nginx 워커 프로세스의 연결 관련 설정
events {
    # 워커 프로세스 1개당 최대 동시 연결 수
    # t2.micro 수준에서 1024면 충분
    worker_connections 1024;
}

# http 블록: HTTP 요청 처리와 관련된 모든 설정이 여기에 들어감
http {
    # 파일 확장자 → Content-Type 헤더 매핑 파일 로드
    # 예: .js → application/javascript, .css → text/css
    # 없으면 브라우저가 JS/CSS 파일을 제대로 실행하지 못함
    include       /etc/nginx/mime.types;

    # mime.types에 없는 확장자의 기본 Content-Type
    # 브라우저가 파일을 "그냥 다운로드"하도록 처리
    default_type  application/octet-stream;

    # server 블록: 하나의 가상 호스트(도메인) 설정
    server {
        # 80번 포트(HTTP)로 들어오는 요청을 이 server 블록이 처리
        listen 80;

        # 어떤 도메인명으로 요청이 와도 이 블록이 받음
        # 실제 배포 후 도메인이 생기면 "vote.example.com" 같은 실제 도메인으로 교체
        server_name _;

        # ── SSE 스트리밍 전용 (/votes/{shareCode}/stream) ────────────────────
        # ~: 정규식으로 매칭 (일반 prefix보다 우선순위 높음 → 아래 /votes 블록보다 먼저 매칭)
        # ^/votes/[^/]+/stream = /votes/로 시작하고, 슬래시 없는 문자열 이후 /stream으로 끝나는 경로
        location ~ ^/votes/[^/]+/stream {
            # 요청을 app 컨테이너(Spring Boot)의 8080 포트로 전달
            # "app"은 docker-compose에서 정의할 Spring Boot 서비스 이름
            proxy_pass http://app:8080;

            # 버퍼링 비활성화: SSE는 서버가 데이터를 실시간으로 흘려보내는 방식
            # Nginx가 버퍼에 쌓았다가 한꺼번에 보내면 실시간 특성이 깨짐
            proxy_buffering off;
            proxy_cache off;

            # HTTP/1.1 사용: keep-alive(연결 유지) 지원을 위해 필요
            # SSE는 연결을 끊지 않고 계속 데이터를 보내야 하므로 필수
            proxy_http_version 1.1;

            # Connection 헤더를 빈 값으로 설정 → Nginx가 연결을 강제 종료하지 않게 함
            proxy_set_header Connection '';

            # 원본 Host 헤더를 Spring Boot에 그대로 전달
            proxy_set_header Host $host;

            # 클라이언트 실제 IP를 Spring Boot에 전달
            # Rate Limiting에서 IP 기반 버킷 키로 사용하는 헤더
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # ── Spring Boot API 프록시 (/votes/**) ───────────────────────────────
        location /votes {
            # $http_accept: 브라우저가 보내는 Accept 요청 헤더
            # 브라우저 주소창에서 직접 URL 입력 → Accept에 "text/html" 포함
            # JavaScript fetch() 호출 → Accept에 "text/html" 없음
            # ~*: 대소문자 구분 없이 정규식 매칭
            if ($http_accept ~* "text/html") {
                # 브라우저 직접 접근이면 index.html로 재작성
                # React Router가 이후 클라이언트 사이드에서 올바른 화면을 렌더링
                # "last": 이 rewrite 규칙 적용 후 location 매칭을 처음부터 다시 시작
                rewrite ^ /index.html last;
            }

            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
        }

        # ── React 정적 파일 서빙 ─────────────────────────────────────────────
        location / {
            # 정적 파일의 루트 경로 (Dockerfile.nginx에서 dist/를 여기에 복사함)
            root /usr/share/nginx/html;
            index index.html;

            # SPA(Single Page Application) 라우팅 처리
            # 1. $uri: 요청한 파일이 실제로 존재하면 그 파일 반환
            # 2. $uri/: 디렉토리가 존재하면 반환
            # 3. /index.html: 둘 다 없으면 무조건 index.html 반환
            # → React Router가 index.html 로드 후 URL을 보고 올바른 화면을 렌더링
            try_files $uri $uri/ /index.html;
        }
    }
}
