spring:
  datasource:
    url: jdbc:mysql://localhost:3306/test
    username: test
    password: test
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop # 테스트 끝나면 정리 어차피 TestContainer가 삭제되므로 create도 무관
    show-sql: true # 실행 SQL 콘솔 출력
    properties:
      hibernate:
        format_sql: true # show-sql로 출력되는 SQL을 들여쓰기 정렬
  data:
    redis:
      host: localhost
      port: 6379