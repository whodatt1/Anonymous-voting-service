apiVersion: 1 # Grafana 프로비저닝 파일 형식 버전. 항상 1 사용

datasources:
  - name: Prometheus # Grafana UI에 표시될 이름. UI에서 이 이름으로 보임
    type: prometheus # 어떤 종류의 데이터소스인지. Grafana 내장 타입 이름이라 정확히 소문자 prometheus로 지정
    access: proxy # Grafana 서버가 Prometheus를 대신 호출. 반대 옵션(direct)은 브라우저가 직접 Prometheus 호출
    # 컨테이너 내부 주소는 브라우저가 접근 불가하므로 반드시 proxy 사용
    url: http://prometheus:9090 # Grafana 컨테이너에서 Prometheus를 찾는 주소
    isDefault: true # 패널을 만들 때 자동으로 이 데이터소스가 선택